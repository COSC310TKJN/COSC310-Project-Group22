version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/DockerFile
    container_name: fastapi-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/usr/src/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
